<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&family=PT+Serif+Caption:ital@0;1&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        @font-face {
            font-family: 'Dahora';
            src: url('Bring Me A Helicopter!.otf') format(truetype);
            font-weight: normal;
            font-size: normal;
        }
        body {
            font-family: 'PT Serif Caption', Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'PT Serif Caption', 'Dahora','Times New Roman', Times, serif;
            font-size: 5em;
        }
    </style>
</head>
<body>
   <h1>Título</h1> 
   <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ex magni amet beatae modi? Fugit labore maiores nesciunt eius molestiae dolor accusamus, harum molestias fugiat. Illum quibusdam officiis quisquam molestias voluptatibus.</p>
</body>
</html>
