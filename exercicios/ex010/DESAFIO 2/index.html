<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="star.ico" type="image/x-icon">
    <title>Tags em HTML</title>
    <style>
        body {
            background-color: #c0c0c0; /* Fundo cinza idêntico ao da imagem */
            margin: 0;
            padding: 30px;
            font-family: 'Times New Roman', Times, serif; /* Fonte clássica com serifa */
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 25px;
        }

        ul {
            list-style-type: square; /* Transforma as bolas da lista em quadrados */
            padding-left: 20px;
        }

        li {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        /* Define que o texto com a dica terá o cursor de ajuda ao passar o rato */
        li span {
            cursor: help;
        }

        /* Faixa azul na parte inferior da página */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background-color: #0000ff; /* Azul puro */
        }
    </style>
</head>
<body>
   <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>

    <ul>
        <li><span title="Use a tag &lt;p&gt;">Parágrafos</span></li>
        <li><span title="Use as tags &lt;h1&gt; a &lt;h6&gt;">Títulos</span></li>
        <li><span title="Use a tag &lt;img&gt;">Imagens</span></li>
        <li><span title="Use a tag &lt;abbr&gt;">Abreviações</span></li>
        <li><span title="Use as tags &lt;pre&gt; e &lt;code&gt;">Códigos-fonte</span></li>
        <li><span title="Use a tag &lt;ol&gt;">Listas numeradas</span></li>
        <li><span title="Use a tag &lt;ul&gt;">Listas com demarcadores</span></li>
    </ul>

    <footer></footer> 
</body>
</html>
